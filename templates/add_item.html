{% extends "layout.html" %}

{% block title %}Add Item - Food Price Tracker{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Add Food Item</h2>
    <form method="post">
        <div class="form-row">
            <label for="name">Item Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-row">
            <label for="price">Price</label>
            <input type="number" id="price" name="price" step="0.01" required>
        </div>
        <div class="form-row">
            <label for="store_id">Store</label>
            <select id="store_id" name="store_id" required>
                {% for store in stores %}
                <option value="{{ store[0] }}">{{ store[1] }} - {{ store[2] }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Add Item</button>
    </form>
</div>
{% endblock %}
